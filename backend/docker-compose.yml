version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: fuckit-db
    environment:
      POSTGRES_USER: fuckit
      POSTGRES_PASSWORD: fuckit
      POSTGRES_DB: fuckit
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
